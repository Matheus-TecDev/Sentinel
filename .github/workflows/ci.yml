name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Backend check
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: postgresql+psycopg://sentinel_test:sentinel_test_password@localhost:5432/sentinel_test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sentinel_test
          POSTGRES_USER: sentinel_test
          POSTGRES_PASSWORD: sentinel_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinel_test -d sentinel_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências do backend
        run: |
          pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run backend unit tests
        run: python -m pytest -m "not integration"

      - name: Run PostgreSQL integration tests
        run: python -m pytest -m integration

      - name: Validar importação da aplicação
        run: |
          python -c "from app.main import app; print('Backend OK')"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do frontend
        working-directory: frontend
        run: npm ci

      - name: Build do frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker build and push
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Login no GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u matheus-tecdev --password-stdin

      - name: Build e push backend
        run: |
          docker build -t ghcr.io/matheus-tecdev/sentinel-backend:1.0.0 ./backend
          docker push ghcr.io/matheus-tecdev/sentinel-backend:1.0.0

      - name: Build e push frontend
        run: |
          docker build -t ghcr.io/matheus-tecdev/sentinel-frontend:1.0.0 ./frontend
          docker push ghcr.io/matheus-tecdev/sentinel-frontend:1.0.0

      - name: Validar docker-compose
        run: docker compose config
